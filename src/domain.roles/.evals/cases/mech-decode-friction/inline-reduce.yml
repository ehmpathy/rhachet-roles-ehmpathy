code: |
  const calculateInvoiceTotal = async (invoice: Invoice, context: Context) => {
    // decode-friction: reader must simulate reduce to understand
    const total = invoice.lineItems.reduce(
      (sum, item) => sum + item.amount * item.quantity,
      0
    );

    await context.invoiceDao.update({ id: invoice.id, total });
    return { ...invoice, total };
  };

