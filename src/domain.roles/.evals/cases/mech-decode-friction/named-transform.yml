code: |
  const sendNotifications = async (users: User[], context: Context) => {
    // reads as narrative - no decode needed
    const emails = getAllActiveUserEmails({ users });
    await context.emailService.sendBulk({ to: emails });
  };

  // transformer extracted with domain name
  const getAllActiveUserEmails = (input: { users: User[] }): string[] => {
    return input.users
      .filter(u => u.active && u.emailVerified)
      .map(u => u.email.toLowerCase())
      .sort();
  };

